{% set name = "flory" %}
{% set version = "0.3.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/flory-{{ version }}.tar.gz
  sha256: 64a329db0d2fa8cb5078ff8bd51eb9b779b1217d8e081ab129b2ffcd1f7c3981

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - setuptools-scm >=8
    - pip
  run:
    - python >={{ python_min }}
    - numba >=0.57
    - numpy >=1.22
    - scipy >=1.7
    - tqdm >=4.60

test:
  imports:
    - flory
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Python package for finding coexisting phases in multicomponent mixtures
  license: MIT
  license_file: LICENSE
  home: https://github.com/qiangyicheng/flory
  doc_url: https://flory.readthedocs.io/

extra:
  recipe-maintainers:
    - david-zwicker
    - qiangyicheng
